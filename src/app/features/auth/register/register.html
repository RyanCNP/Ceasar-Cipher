<div class="auth-container">
  <form class="auth-form">
    <div class="auth-header">
      <img src="aguia-imperial-romana.png" alt="SPQR" class="auth-logo">
      <h2>Novo Recrutado</h2>
      <p>Crie sua conta para cifrar mensagens</p>
    </div>

    <div class="input-group">
      <label for="reg-name">Nome Completo</label>
      <input type="text" id="reg-name" placeholder="Seu Nome" required>
    </div>

    <div class="input-group">
      <label for="reg-user">Usuário</label>
      <input type="text" id="reg-user" placeholder="Nome de usuário" required>
    </div>

    <div class="input-group">
      <label for="reg-password">Senha</label>
      <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres" required>
    </div>

    <button type="submit" class="btn-base btn-gold full-width">Cadastrar</button>

    <p class="auth-footer">
      Já é um legionário? <a routerLink="/login">Fazer Login</a>
    </p>
  </form>
</div>
